{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Financee</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Login CSS -->
  <link rel="stylesheet" href="{% static 'css/login_styling.css' %}">
</head>
<body>

  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo-icon">
        <i class="fa-solid fa-coins"></i>
      </div>
      <h1>Financee</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" method="POST" autocomplete="off" novalidate>
      {% csrf_token %}

      <div class="auth-form-group mb-3">
        <label for="username">
          <i class="fa-solid fa-user" style="margin-right:4px;font-size:0.78rem;"></i>
          Username
        </label>
        <input type="text" class="form-control" name="username" id="username"
               placeholder="Enter your username" required autocomplete="username">
      </div>

      <div class="auth-form-group mb-3">
        <label for="password">
          <i class="fa-solid fa-lock" style="margin-right:4px;font-size:0.78rem;"></i>
          Password
        </label>
        <div class="password-wrapper">
          <input type="password" class="form-control" name="password" id="password"
                 placeholder="Enter your password" required autocomplete="current-password">
          <button class="toggle-btn" type="button" id="togglePassword"
                  aria-label="Toggle password visibility" title="Show / hide password">
            <i class="fa-regular fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i>
        Sign In
      </button>
    </form>

    <div class="auth-footer-note">
      &copy; {% now "Y" %} Financee &nbsp;·&nbsp; All rights reserved
    </div>
  </div>

  <script>
    // Password toggle
    const toggleBtn  = document.getElementById('togglePassword');
    const passwordEl = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', function () {
      const isHidden = passwordEl.getAttribute('type') === 'password';
      passwordEl.setAttribute('type', isHidden ? 'text' : 'password');
      toggleIcon.className = isHidden ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
    });

    // AJAX login
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in…';

      const formData = new FormData(this);

      try {
        const response = await fetch("{% url 'authentication:login' %}", {
          method: 'POST',
          body: formData,
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });

        const data = await response.json();

        if (data.status === 'success') {
          Swal.fire({
            icon: 'success',
            title: 'Welcome back!',
            text: data.message,
            showConfirmButton: false,
            timer: 1400,
            timerProgressBar: true
          }).then(() => {
            window.location.href = "{% url 'home:home' %}";
          });
        } else {
          Swal.fire({
            icon: 'error',
            title: 'Login Failed',
            text: data.message,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Try again'
          });
          btn.classList.remove('loading');
          btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
        }
      } catch (err) {
        Swal.fire({
          icon: 'error',
          title: 'Connection Error',
          text: 'Could not reach the server. Please try again.',
          confirmButtonColor: '#dc2626'
        });
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
      }
    });

    // Auto-focus username
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('username')?.focus();
    });
  </script>

</body>
</html>
