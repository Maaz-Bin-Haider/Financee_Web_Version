{% extends 'base/base.html' %}
{% load static %}

{% block title %}Stock Reports{% endblock title %}

{% block SeperateCssFile %}
<link rel="stylesheet" href="{% static 'css/accounts_reports.css' %}">
<link rel="stylesheet" href="{% static 'css/stock_reports.css' %}">
{% endblock SeperateCssFile %}

{% block body %}

<!-- Page title bar -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.1rem;">
  <div style="width:36px;height:36px;background:#ecfdf5;border-radius:var(--radius-md);
              display:flex;align-items:center;justify-content:center;color:var(--brand-success);font-size:0.95rem;flex-shrink:0;">
    <i class="fa-solid fa-warehouse"></i>
  </div>
  <div>
    <h2 style="margin:0;font-size:1.2rem;font-weight:700;letter-spacing:-0.02em;">Stock Reports</h2>
    <p style="margin:0;font-size:0.78rem;color:var(--text-tertiary);">Item history, serial ledger, stock worth &amp; more</p>
  </div>
</div>

<div class="reports-wrapper">

  <!-- ====== LEFT PANEL ====== -->
  <aside class="left-panel">
    <h3>Stock</h3>
    <div class="report-buttons">
      <button class="report-btn" id="btn-summary"
              onclick="selectReport('summary')">
        <i class="fa-solid fa-chart-bar" style="margin-right:7px;font-size:0.78rem;"></i>Stock Report
      </button>
      <button class="report-btn" id="btn-stock"
              onclick="selectReport('stock')">
        <i class="fa-solid fa-layer-group" style="margin-right:7px;font-size:0.78rem;"></i>Stock Serial Wise
      </button>
      <button class="report-btn" id="btn-serial"
              onclick="selectReport('serial')">
        <i class="fa-solid fa-hashtag" style="margin-right:7px;font-size:0.78rem;"></i>Serial Ledger
      </button>
      <button class="report-btn"
              onclick="selectReport('seril-ledger-with-sold-flag')">
        <i class="fa-solid fa-flag" style="margin-right:7px;font-size:0.78rem;"></i>Serial Ledger Sold Flag
      </button>
      <button class="report-btn" id="btn-serial-purchase-only"
              onclick="selectReport('serial-purchase-only')">
        <i class="fa-solid fa-bag-shopping" style="margin-right:7px;font-size:0.78rem;"></i>Serial Ledger Purchase
      </button>
      <button class="report-btn" id="btn-serial-sale-only"
              onclick="selectReport('serial-sale-only')">
        <i class="fa-solid fa-cart-arrow-down" style="margin-right:7px;font-size:0.78rem;"></i>Serial Ledger Sale
      </button>
      <button class="report-btn active" id="btn-history"
              onclick="selectReport('history')">
        <i class="fa-solid fa-clock-rotate-left" style="margin-right:7px;font-size:0.78rem;"></i>Item History
      </button>
      <button class="report-btn" id="btn-item-detail"
              onclick="selectReport('item-detail')">
        <i class="fa-solid fa-circle-info" style="margin-right:7px;font-size:0.78rem;"></i>Item Detail
      </button>
      <button class="report-btn" id="btn-worth"
              onclick="selectReport('worth')">
        <i class="fa-solid fa-sack-dollar" style="margin-right:7px;font-size:0.78rem;"></i>Stock Worth Report
      </button>
      <button class="report-btn" id="btn-item-last-purchase"
              onclick="selectReport('item-last-purchase')">
        <i class="fa-solid fa-arrow-trend-down" style="margin-right:7px;font-size:0.78rem;"></i>Item Last Purchase
      </button>
      <button class="report-btn" id="btn-item-last-sale"
              onclick="selectReport('item-last-sale')">
        <i class="fa-solid fa-arrow-trend-up" style="margin-right:7px;font-size:0.78rem;"></i>Items Last Sale
      </button>
    </div>
  </aside>

  <!-- ====== RIGHT PANEL ====== -->
  <section class="right-panel">

    <!-- Filter / form area -->
    <div id="report-form-container" class="form-section"></div>

    <!-- Table actions -->
    <div class="table-actions">
      <button id="download_pdf" class="btn-download">
        <i class="fa-solid fa-file-pdf"></i> PDF
      </button>
      <button id="download_csv" class="btn-download btn-csv">
        <i class="fa-solid fa-file-csv"></i> CSV
      </button>
    </div>

    <!-- Result table -->
    <div class="table-container">
      <table id="reportTable">
        <thead id="reportHeader"></thead>
        <tbody id="reportBody">
          <tr><td class="no-data">
            <i class="fa-solid fa-box-open" style="display:block;font-size:1.8rem;margin-bottom:0.6rem;opacity:0.3;"></i>
            Select a report to view results
          </td></tr>
        </tbody>
      </table>
    </div>

  </section>
</div>

<!-- Dependencies -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
  window.ITEM_AUTOCOMPLETE_URL = "{% url 'items:autocomplete_item' %}";
</script>
<script src="{% static 'js/stock_reports.js' %}"></script>

{% endblock body %}
